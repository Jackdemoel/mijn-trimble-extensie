<!DOCTYPE html>
<html>
<head>
    <title>BCF Clash Helper v1.6</title>
    <style>
        body { font-family: sans-serif; padding: 10px; color: #333; background: #f4f4f4; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #0078d4; border-bottom: 2px solid #0078d4; padding-bottom: 5px; font-size: 1.1em; }
        .version { font-size: 0.7em; color: #999; float: right; }
        button { background: #0078d4; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 8px; width: 100%; }
        .clash-item { background: #fff; border: 1px solid #ddd; padding: 8px; margin-bottom: 5px; font-size: 0.8em; cursor: pointer; border-left: 4px solid #e81123; }
        .clash-item:hover { border-color: #0078d4; }
        .filter-box { background: #eef4f9; padding: 10px; border-radius: 4px; margin-bottom: 10px; border: 1px solid #d0e0ed; font-size: 0.8em; }
        .hidden { display: none; }
        .tag-isolatie { background: #ffeb3b; padding: 2px 4px; border-radius: 3px; font-weight: bold; }
    </style>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
</head>
<body>
    <div class="card">
        <span class="version">v1.6</span>
        <h3>BCF Clash Helper</h3>
        <div id="project-name" style="font-size: 0.8em; margin-bottom: 10px;">Laden...</div>
        
        <button id="btn-main-action">Haal Clashsets Op</button>

        <div id="filter-section" class="hidden">
            <div class="filter-box">
                <input type="checkbox" id="hide-isolatie"> 
                <label for="hide-isolatie">Verberg Clashes met <strong>'Isolatie'</strong></label>
                <p id="filter-status" style="margin: 5px 0 0 0; font-size: 0.9em;"></p>
            </div>
        </div>
        
        <div id="content-area"></div>

        <div id="items-container" style="display:none; margin-top:10px;">
            <h4 style="margin:0 0 10px 0; font-size:0.9em;">Resultaten:</h4>
            <div id="items-list"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
