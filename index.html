<!DOCTYPE html>
<html>
<head>
    <title>BCF Clash Helper v1.8</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 0; margin: 0; color: #333; background: #fff; }
        .header { background: #f1f1f1; padding: 10px 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .header h3 { margin: 0; font-size: 14px; color: #444; }
        .container { padding: 15px; }
        button { background: #0078d4; color: white; border: none; padding: 8px 12px; border-radius: 2px; cursor: pointer; font-size: 13px; font-weight: 600; width: 100%; margin-bottom: 10px; }
        .clash-set-card { border: 1px solid #ddd; padding: 10px; margin-bottom: 8px; cursor: pointer; border-left: 4px solid #666; }
        .filter-section { background: #f9f9f9; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; }
        select { width: 100%; padding: 5px; border: 1px solid #ccc; font-size: 13px; }
        .clash-item { border-bottom: 1px solid #eee; padding: 10px 5px; cursor: pointer; transition: background 0.2s; }
        .clash-item:hover { background-color: #f0f7ff; }
        .clash-item.active-clash { background-color: #e1f0ff; border-right: 3px solid #0078d4; }
        .clash-label { font-weight: bold; font-size: 12px; display: block; }
        .clash-types { font-size: 11px; color: #0078d4; }
        .hidden { display: none; }
    </style>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
</head>
<body>
    <div class="header">
        <h3>BCF CLASH HELPER</h3>
        <span id="project-label" style="font-size: 10px;">v1.8</span>
    </div>

    <div class="container">
        <div id="set-selection-area">
            <button id="btn-load-sets">Haal Project Clashsets</button>
            <div id="clash-sets-list"></div>
        </div>

        <div id="detail-area" class="hidden">
            <button onclick="backToSets()" style="background:#666; margin-bottom:10px;">⬅ Terug</button>
            <div class="filter-section">
                <select id="type-filter"><option value="ALL">Alle types</option></select>
            </div>
            <div id="clash-items-list"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
