<!DOCTYPE html>
<html>
<head>
    <title>Hello Trimble</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
</head>
<body>
    <h3>Clash Helper</h3>
    <div id="project-name">Laden...</div>
    <button id="btn-token">Vraag Access Token</button>

    <script>
    async function init() {
        const API = await TrimbleConnectWorkspace.connect(
            window.parent, 
            (event, data) => {
                // Hier luisteren we naar gebeurtenissen in de viewer
                if (event === "extension.command") {
                    console.log("Commando ontvangen:", data); [cite: 143, 144]
                }
            }
        );

        // Projectnaam tonen [cite: 187]
        const project = await API.project.getCurrentProject();
        document.getElementById('project-name').innerText = "Project: " + project.name;

        // Nieuwe functie: Haal geladen modellen op
        // Dit is de eerste stap om te zien waar clashes vandaan komen
        const models = await API.viewer.getModels(); 
        console.log("Geladen modellen:", models);

        document.getElementById('btn-token').onclick = async () => {
            const token = await API.extension.requestPermission("accesstoken"); [cite: 71, 198]
            console.log("Token ontvangen:", token); [cite: 73, 75]
            alert("Token is veilig opgeslagen in de console.");
        };
    }

    init();
</script>
</body>
</html>
