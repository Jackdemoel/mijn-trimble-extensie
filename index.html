<!DOCTYPE html>
<html>
<head>
    <title>BCF Clash Helper v4.6</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; background: #fff; }
        button { background: #0078d4; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .clash-item { border-bottom: 1px solid #eee; padding: 10px; cursor: pointer; }
        .clash-item:hover { background: #f0f7ff; }
        .active { border-left: 4px solid #0078d4; background: #f0f7ff; }
    </style>
</head>
<body>
    <div id="project-label">Laden...</div>
    <button id="btn-load">1. ACTIVEER VIEWER DATA</button>
    <div id="list"></div>

    <script>
        var API;
        var accessToken;
        var currentProject;

        async function init() {
            // Verbinding maken volgens sectie 1.1
            API = await TrimbleConnectWorkspace.connect(window.parent, (event, data) => {
                console.log("Viewer Event:", event, data);
            });
            
            currentProject = await API.project.getCurrentProject();
            document.getElementById('project-label').innerText = "Project: " + currentProject.name;
        }

        document.getElementById('btn-load').onclick = async () => {
            // Stap A: Request permission [cite: 1]
            accessToken = await API.extension.requestPermission("accesstoken");
            
            // Stap B: CRUCIAAL - Geef de token terug aan de viewer (Sectie 2.1)
            await API.embed.setTokens({ accessToken: accessToken });
            
            loadClashSets();
        };

        async function loadClashSets() {
            var resp = await fetch(`https://app21.connect.trimble.com/tc/api/2.0/clashsets?projectId=${currentProject.id}`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            var sets = await resp.json();
            document.getElementById('list').innerHTML = sets.map(s => `<button onclick="loadItems('${s.id}')">${s.name}</button>`).join('');
        }

        async function loadItems(setId) {
            var resp = await fetch(`https://app21.connect.trimble.com/tc/api/2.0/clashsets/${setId}/items`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            var items = await resp.json();
            render(items);
        }

        function render(items) {
            document.getElementById('list').innerHTML = items.slice(0, 20).map(i => `
                <div class="clash-item" onclick="focusClash('${i.sourceId1.versionId}', '${i.sourceId1.sourceId}', ${i.center.x}, ${i.center.y}, ${i.center.z})">
                    ${i.label}
                </div>
            `).join('');
        }

        async function focusClash(vId, sId, x, y, z) {
            // Gebruik de 'id:' prefix zoals gesuggereerd door de Model Entity info [cite: 52]
            var selection = [{
                modelId: vId,
                objectIds: ["id:" + sId]
            }];

            await API.viewer.setSelection(selection);

            // Camera in meters (0.001 factor)
            var f = 0.001;
            await API.viewer.setCamera({
                lookAt: { x: x*f, y: y*f, z: z*f },
                position: { x: (x*f)+1, y: (y*f)+1, z: (z*f)+1 },
                projectionType: "perspective"
            });
        }

        init();
    </script>
</body>
</html>
