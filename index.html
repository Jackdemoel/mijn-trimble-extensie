<!DOCTYPE html>
<html>
<head>
    <title>BCF Clash Helper v3.2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 0; margin: 0; background: #fff; color: #333; }
        .header { background: #333; padding: 10px 15px; color: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0078d4; }
        .header h3 { margin: 0; font-size: 14px; text-transform: uppercase; }
        .container { padding: 15px; }
        button { background: #0078d4; color: white; border: none; padding: 10px; border-radius: 2px; cursor: pointer; font-weight: 600; width: 100%; margin-bottom: 10px; }
        .clash-card { border: 1px solid #ddd; padding: 12px; margin-bottom: 8px; cursor: pointer; border-left: 4px solid #444; background: #fafafa; }
        .filter-box { background: #f1f1f1; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; }
        .clash-item { border-bottom: 1px solid #eee; padding: 12px 8px; cursor: pointer; border-left: 4px solid transparent; }
        .clash-item:hover { background-color: #f0f7ff; }
        .clash-item.active { border-left-color: #0078d4; background-color: #e1f0ff; }
        .product-title { display: block; font-weight: bold; font-size: 13px; color: #0078d4; margin-bottom: 4px; }
        .product-meta { font-size: 11px; color: #555; line-height: 1.4; }
        .hidden { display: none; }
    </style>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
</head>
<body>
    <div class="header">
        <h3>BCF CLASH HELPER</h3>
        <span style="font-size: 10px;">v3.2</span>
    </div>

    <div class="container">
        <div id="project-label" style="font-size: 11px; margin-bottom: 12px; font-weight: bold; color: #666;">VERBINDEN...</div>
        
        <div id="set-selection-area">
            <button id="btn-load-sets">HAAL PROJECT CLASHSETS</button>
            <div id="clash-sets-list"></div>
        </div>

        <div id="detail-area" class="hidden">
            <button id="btn-back" style="background:#666; width: auto; padding: 5px 15px;">⬅ OVERZICHT</button>
            
            <div class="filter-box">
                <label style="font-size: 11px; font-weight: bold;">FILTER OP PRODUCT:</label>
                <select id="product-dropdown" style="width:100%; padding:8px; margin-top:5px;">
                    <option value="ALL">-- Toon alle clashes --</option>
                </select>
            </div>

            <div id="clash-items-list"></div>
        </div>
    </div>

    <script>
        let API;
        let accessToken = null;
        let currentProjectId = null;
        let activeClashItems = [];
        const API_BASE_URL = "https://app21.connect.trimble.com/tc/api/2.0";

        async function init() {
            try {
                API = await TrimbleConnectWorkspace.connect(window.parent, (event, data) => {
                    // Ontvangt events zoals onSelectionChanged
                });
                const project = await API.project.getCurrentProject();
                currentProjectId = project.id;
                document.getElementById('project-label').innerText = "PROJECT: " + project.name.toUpperCase();
            } catch (error) { console.error("API Error:", error); }
        }

        document.getElementById('btn-load-sets').onclick = async () => {
            if (!accessToken) accessToken = await API.extension.requestPermission("accesstoken");
            if (accessToken === "pending") return;
            loadClashSets();
        };

        async function loadClashSets() {
            const response = await fetch(`${API_BASE_URL}/clashsets?projectId=${currentProjectId}`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const sets = await response.json();
            document.getElementById('clash-sets-list').innerHTML = sets.map(s => `
                <div class="clash-card" onclick="openClashSet('${s.id}')">
                    <strong>${s.name}</strong><br><small>${s.count} items</small>
                </div>`).join('');
        }

        async function openClashSet(clashId) {
            document.getElementById('set-selection-area').classList.add('hidden');
            document.getElementById('detail-area').classList.remove('hidden');
            const response = await fetch(`${API_BASE_URL}/clashsets/${clashId}/items`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            activeClashItems = await response.json();
            
            const dropdown = document.getElementById('product-dropdown');
            const products = new Set();
            activeClashItems.forEach(i => {
                if (i.elementName1) products.add(i.elementName1.split(':')[0]);
                if (i.elementName2) products.add(i.elementName2.split(':')[0]);
            });
            dropdown.innerHTML = '<option value="ALL">-- Toon alle clashes --</option>' + 
                Array.from(products).sort().map(p => `<option value="${p}">${p}</option>`).join('');

            renderFilteredItems();
        }

        function renderFilteredItems() {
            const filterValue = document.getElementById('product-dropdown').value;
            const filtered = activeClashItems.filter(i => {
                if (filterValue === "ALL") return true;
                return (i.elementName1 && i.elementName1.includes(filterValue)) || 
                       (i.elementName2 && i.elementName2.includes(filterValue));
            });

            document.getElementById('clash-items-list').innerHTML = filtered.slice(0, 50).map(i => `
                <div class="clash-item" id="item-${i.id}" onclick="focusClash('${i.id}')">
                    <span class="product-title">${i.label}</span>
                    <div class="product-meta">
                        <b>A:</b> ${i.elementName1}<br><b>B:</b> ${i.elementName2}
                    </div>
                </div>`).join('');
        }

        async function focusClash(clashItemId) {
            const item = activeClashItems.find(i => i.id === clashItemId);
            if (!item || !API) return;

            document.querySelectorAll('.clash-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`item-${clashItemId}`).classList.add('active');

            try {
                // STAP 1: Selectie (Bewezen werkend in logs)
                const sel = [
                    { modelId: item.sourceId1.versionId, objectIds: [item.sourceId1.sourceId] },
                    { modelId: item.sourceId2.versionId, objectIds: [item.sourceId2.sourceId] }
                ];
                await API.viewer.setSelection(sel);

                // STAP 2: Camera (Herschreven om crashes te voorkomen)
                if (item.center) {
                    const factor = 0.001; // Schaling naar meters
                    const tx = item.center.x * factor;
                    const ty = item.center.y * factor;
                    const tz = item.center.z * factor;

                    // We gebruiken de setCamera functie die we in de HAR log zagen
                    await API.viewer.setCamera({
                        lookAt: { x: tx, y: ty, z: tz },
                        position: { x: tx + 0.8, y: ty + 0.8, z: tz + 0.8 },
                        projectionType: "perspective"
                    });
                }
            } catch (e) { 
                console.error("Camera fout:", e); 
            }
        }

        document.getElementById('btn-back').onclick = () => {
            document.getElementById('set-selection-area').classList.remove('hidden');
            document.getElementById('detail-area').classList.add('hidden');
        };
        document.getElementById('product-dropdown').onchange = renderFilteredItems;

        init();
    </script>
</body>
</html>
