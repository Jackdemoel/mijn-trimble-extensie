<!DOCTYPE html>
<html>
<head>
    <title>BCF Clash Helper v4.2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 0; margin: 0; background: #fff; color: #333; }
        .header { background: #333; padding: 10px 15px; color: white; border-bottom: 2px solid #0078d4; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 15px; }
        button { background: #0078d4; color: white; border: none; padding: 10px; border-radius: 2px; cursor: pointer; font-weight: 600; width: 100%; margin-bottom: 10px; }
        .clash-card { border: 1px solid #ddd; padding: 10px; margin-bottom: 8px; cursor: pointer; border-left: 4px solid #444; background: #fafafa; }
        .clash-item { border-bottom: 1px solid #eee; padding: 12px 8px; cursor: pointer; border-left: 3px solid transparent; }
        .clash-item.active { border-left-color: #0078d4; background-color: #e1f0ff; }
        .meta { font-size: 11px; color: #666; margin-top: 4px; }
        .hidden { display: none; }
        #log-panel { font-size: 10px; color: #0078d4; background: #f0f7ff; padding: 8px; margin-top: 10px; border: 1px solid #c0d7ff; }
    </style>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
</head>
<body>
    <div class="header"><h3>BCF CLASH HELPER</h3><span>v4.2</span></div>
    <div class="container">
        <div id="project-label" style="font-size: 11px; margin-bottom: 10px; font-weight: bold; color: #666;">INITIALISEREN...</div>
        
        <div id="set-selection-area">
            <button id="btn-load-sets">LADEN CLASHSETS</button>
            <div id="clash-sets-list"></div>
        </div>

        <div id="detail-area" class="hidden">
            <button onclick="location.reload()" style="background:#666;">⬅ TERUG NAAR OVERZICHT</button>
            <div id="clash-items-list"></div>
            <div id="log-panel">Kies een clash voor live mapping...</div>
        </div>
    </div>

    <script>
        var API;
        var accessToken = null;
        var currentProjectId = null;
        var activeClashItems = [];
        var API_BASE_URL = "https://app21.connect.trimble.com/tc/api/2.0";
        var MODEL_API_URL = "https://model-api21.connect.trimble.com/v1";

        async function init() {
            try {
                API = await TrimbleConnectWorkspace.connect(window.parent, (event, data) => {});
                var project = await API.project.getCurrentProject();
                currentProjectId = project.id;
                document.getElementById('project-label').innerText = "PROJECT: " + project.name;
            } catch (error) { console.error("Opstartfout:", error); }
        }

        document.getElementById('btn-load-sets').onclick = async () => {
            if (!accessToken) accessToken = await API.extension.requestPermission("accesstoken");
            loadClashSets();
        };

        async function loadClashSets() {
            var list = document.getElementById('clash-sets-list');
            list.innerHTML = "Laden...";
            try {
                var response = await fetch(`${API_BASE_URL}/clashsets?projectId=${currentProjectId}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                var sets = await response.json();
                list.innerHTML = sets.map(s => `
                    <div class="clash-card" onclick="openClashSet('${s.id}')"><strong>${s.name}</strong></div>
                `).join('');
            } catch (err) { list.innerHTML = "Fout bij laden."; }
        }

        async function openClashSet(clashId) {
            document.getElementById('set-selection-area').classList.add('hidden');
            document.getElementById('detail-area').classList.remove('hidden');
            var list = document.getElementById('clash-items-list');
            list.innerHTML = "Items ophalen...";

            try {
                var response = await fetch(`${API_BASE_URL}/clashsets/${clashId}/items`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                activeClashItems = await response.json();
                renderItems();
            } catch (err) { list.innerHTML = "Fout bij ophalen."; }
        }

        function renderItems() {
            document.getElementById('clash-items-list').innerHTML = activeClashItems.slice(0, 30).map(i => `
                <div class="clash-item" id="item-${i.id}" onclick="focusClash('${i.id}')">
                    <strong>${i.label}</strong>
                    <div class="meta">A: ${i.elementName1}</div>
                </div>
            `).join('');
        }

        // De "Bridge" functie: vertaalt GUID naar interne Viewer Index (idx)
        async function getIdx(modelId, sourceId) {
            try {
                var url = `${MODEL_API_URL}/models/${modelId}/entities/${sourceId}?fields=idx`;
                var resp = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                var data = await resp.json();
                return data.idx;
            } catch (e) { return null; }
        }

        async function focusClash(clashItemId) {
            var item = activeClashItems.find(i => i.id === clashItemId);
            if (!item || !API) return;

            document.querySelectorAll('.clash-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`item-${clashItemId}`).classList.add('active');
            var log = document.getElementById('log-panel');
            log.innerText = "Mapping zoeken...";

            try {
                // STAP 1: Vertaal GUIDs naar interne nummers (idx)
                var idx1 = await getIdx(item.sourceId1.versionId, item.sourceId1.sourceId);
                var idx2 = await getIdx(item.sourceId2.versionId, item.sourceId2.sourceId);

                log.innerText = `Interne ID's: idx:${idx1} & idx:${idx2}`;

                // STAP 2: Selecteer specifiek met 'idx:' prefix
                var sel = [];
                if (idx1 !== null) sel.push({ modelId: item.sourceId1.versionId, objectIds: ["idx:" + idx1] });
                if (idx2 !== null) sel.push({ modelId: item.sourceId2.versionId, objectIds: ["idx:" + idx2] });

                await API.viewer.setSelection(sel);

                // STAP 3: Camera focus (meters)
                if (item.center) {
                    var f = 0.001;
                    var tx = item.center.x * f;
                    var ty = item.center.y * f;
                    var tz = item.center.z * f;

                    await API.viewer.setCamera({
                        lookAt: { x: tx, y: ty, z: tz },
                        position: { x: tx + 0.5, y: ty + 0.5, z: tz + 0.5 },
                        projectionType: "perspective"
                    });
                }
            } catch (e) { log.innerText = "Viewer fout: " + e.message; }
        }

        init();
    </script>
</body>
</html>
