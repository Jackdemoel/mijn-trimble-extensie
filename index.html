<!DOCTYPE html>
<html>
<head>
    <title>BCF Clash Helper</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; }
        .card { border: 1px solid #ccc; padding: 15px; border-radius: 8px; background: #f9f9f9; }
        button { background: #0078d4; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #005a9e; }
        #status { margin-top: 15px; font-size: 0.9em; color: #666; }
    </style>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
</head>
<body>
    <div class="card">
        <h3>BCF Clash Helper</h3>
        <div id="project-name">Verbinden met Trimble Connect...</div>
        
        <button id="btn-token">Vraag Access Token</button>
        
        <div id="status">Bekijk de browser console (F12) voor technische details.</div>
    </div>

    <script>
        let API;

        async function init() {
            try {
                // Initialiseer de verbinding met de 3D Viewer
                API = await TrimbleConnectWorkspace.connect(
                    window.parent, 
                    (event, data) => {
                        console.log("Event ontvangen van viewer:", event, data);
                    }
                );

                // Haal huidige projectinformatie op
                const project = await API.project.getCurrentProject();
                document.getElementById('project-name').innerText = "Project: " + project.name;
                console.log("Project info geladen:", project);

                // Haal lijst met geladen modellen op
                const models = await API.viewer.getModels();
                console.log("Geladen modellen in viewer:", models);

                // Probeer clashsets op te halen (indien ondersteund door viewer module)
                if (API.viewer.getClashSets) {
                    const clashSets = await API.viewer.getClashSets();
                    console.log("Beschikbare clashsets:", clashSets);
                }

            } catch (error) {
                console.error("Fout bij initialiseren API:", error);
                document.getElementById('project-name').innerText = "Verbindingsfout. Controleer console.";
            }
        }

        // Token aanvraag knop functionaliteit
        document.getElementById('btn-token').onclick = async () => {
            if (!API) return alert("API nog niet verbonden");
            
            try {
                // Vraag toestemming voor het token
                const token = await API.extension.requestPermission("accesstoken");
                console.log("Access Token status/waarde:", token);
                
                if (token === "pending") {
                    alert("Accepteer de toestemming in het Trimble Connect venster.");
                } else {
                    alert("Token succesvol ontvangen! Zie console voor de waarde.");
                }
            } catch (err) {
                console.error("Fout bij token aanvraag:", err);
            }
        };

        // Start de applicatie
        init();
    </script>
</body>
</html>
