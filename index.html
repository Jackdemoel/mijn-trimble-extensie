<!DOCTYPE html>
<html>
<head>
    <title>BCF Clash Helper v2.5</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 0; margin: 0; color: #333; background: #fff; }
        .header { background: #333; padding: 10px 15px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .header h3 { margin: 0; font-size: 14px; }
        .container { padding: 15px; }
        button { background: #0078d4; color: white; border: none; padding: 10px; border-radius: 2px; cursor: pointer; font-weight: 600; width: 100%; margin-bottom: 10px; }
        .clash-card { border: 1px solid #ddd; padding: 10px; margin-bottom: 8px; cursor: pointer; border-left: 4px solid #444; }
        .filter-area { background: #f1f1f1; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; }
        .clash-item { border-bottom: 1px solid #eee; padding: 10px 5px; cursor: pointer; border-left: 3px solid transparent; }
        .clash-item:hover { background-color: #f0f7ff; }
        .clash-item.active { border-left-color: #0078d4; background-color: #e1f0ff; }
        .product-label { display: block; font-weight: bold; font-size: 12px; color: #0078d4; }
        .meta-info { font-size: 11px; color: #666; margin-top: 4px; }
        .hidden { display: none; }
        .status-tag { font-size: 10px; color: green; font-weight: bold; margin-bottom: 5px; display: block; }
    </style>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
</head>
<body>
    <div class="header">
        <h3>BCF CLASH HELPER</h3>
        <span style="font-size: 10px;">v2.5</span>
    </div>

    <div class="container">
        <div id="project-name" style="font-size: 12px; font-weight: bold; margin-bottom: 10px;">Laden...</div>
        
        <div id="set-selection-area">
            <button id="btn-load-sets">Haal Clashsets Op</button>
            <div id="clash-sets-list"></div>
        </div>

        <div id="detail-area" class="hidden">
            <button id="btn-back" style="background:#666;">⬅ Terug naar overzicht</button>
            <div class="filter-area">
                <label style="font-size: 11px; font-weight: bold;">FILTER OP PRODUCT NAAM:</label>
                <input type="text" id="product-filter" placeholder="Type bijv. 'Pipe' of 'Cable'...">
            </div>
            <div id="clash-items-list"></div>
        </div>
    </div>

    <script>
        let API;
        let accessToken = null;
        let currentProjectId = null;
        let activeClashItems = [];
        const API_BASE_URL = "https://app21.connect.trimble.com/tc/api/2.0";

        async function init() {
            try {
                // Verbinding maken met Trimble Connect [cite: 68]
                API = await TrimbleConnectWorkspace.connect(window.parent, (event, data) => {
                    console.log("Viewer Event:", event, data);
                });

                // Haal projectgegevens op [cite: 53, 187]
                const project = await API.project.getCurrentProject();
                currentProjectId = project.id;
                document.getElementById('project-name').innerText = "Project: " + project.name;
            } catch (error) {
                console.error("Fout bij opstarten:", error);
            }
        }

        // Hoofdactie
        document.getElementById('btn-load-sets').onclick = async () => {
            if (!accessToken) {
                // Automatisch token aanvragen als we het nog niet hebben [cite: 71, 198]
                accessToken = await API.extension.requestPermission("accesstoken");
            }
            if (accessToken && accessToken !== "pending") {
                loadClashSets();
            }
        };

        async function loadClashSets() {
            const list = document.getElementById('clash-sets-list');
            list.innerHTML = "Ophalen...";
            try {
                const response = await fetch(`${API_BASE_URL}/clashsets?projectId=${currentProjectId}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const sets = await response.json();
                list.innerHTML = sets.map(s => `
                    <div class="clash-card" onclick="openClashSet('${s.id}')">
                        <strong>${s.name}</strong><br>
                        <small>${s.count} clashes gevonden</small>
                    </div>
                `).join('');
            } catch (err) {
                list.innerHTML = "Fout bij laden van data.";
            }
        }

        async function openClashSet(clashId) {
            document.getElementById('set-selection-area').classList.add('hidden');
            document.getElementById('detail-area').classList.remove('hidden');
            const list = document.getElementById('clash-items-list');
            list.innerHTML = "Clashes laden...";

            try {
                const response = await fetch(`${API_BASE_URL}/clashsets/${clashId}/items`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                activeClashItems = await response.json();
                renderFilteredItems();
            } catch (err) {
                list.innerHTML = "Fout bij ophalen items.";
            }
        }

        function renderFilteredItems() {
            const filterTxt = document.getElementById('product-filter').value.toLowerCase();
            const list = document.getElementById('clash-items-list');
            
            const filtered = activeClashItems.filter(i => 
                (i.elementName1 && i.elementName1.toLowerCase().includes(filterTxt)) || 
                (i.elementName2 && i.elementName2.toLowerCase().includes(filterTxt))
            );

            list.innerHTML = filtered.slice(0, 50).map(i => `
                <div class="clash-item" id="item-${i.id}" onclick="focusClash('${i.id}')">
                    <span class="product-label">${i.label}</span>
                    <div class="meta-info">
                        A: ${i.elementName1}<br>
                        B: ${i.elementName2}
                    </div>
                </div>
            `).join('') + (filtered.length > 50 ? "<p style='font-size:10px;'>...lijst beperkt tot 50 items</p>" : "");
        }

        async function focusClash(clashItemId) {
    // 1. Zoek de data van de aangeklikte clash op
    const item = activeClashItems.find(i => i.id === clashItemId);
    if (!item || !API) return;

    // UI: Markeer het item in de lijst
    document.querySelectorAll('.clash-item').forEach(el => el.classList.remove('active'));
    document.getElementById(`item-${clashItemId}`).classList.add('active');

    try {
        /**
         * CRUCIAL: De 'selectionData' moet een array van objecten zijn.
         * Elk object definieert welk model (modelId) en welke objecten (objectIds).
         * De 'versionId' uit de Clash API is de 'modelId' voor de viewer.
         */
        const selectionData = [];

        if (item.sourceId1 && item.sourceId1.versionId) {
            selectionData.push({
                modelId: item.sourceId1.versionId,   // Dit is het ID van het .ifc bestand
                objectIds: [item.sourceId1.sourceId] // Dit is het ID van het specifieke object (buis/tray)
            });
        }

        if (item.sourceId2 && item.sourceId2.versionId) {
            selectionData.push({
                modelId: item.sourceId2.versionId,
                objectIds: [item.sourceId2.sourceId]
            });
        }

        console.log("Stuur selectie naar viewer:", selectionData);

        // STAP A: Selecteer de specifieke objecten
        // Dit zorgt ervoor dat alleen de twee botsende elementen oplichten (vaak paars)
        await API.viewer.setSelection(selectionData);

        // STAP B: Isolatie (De 'Ghost' mode voorkomen)
        // We verbergen eerst ALLES (lege array + true)
        await API.viewer.setObjectsVisibility([], true); 
        
        // Daarna maken we alleen onze selectie weer zichtbaar (selectionData + false)
        // In de Workspace API betekent 'false' voor hidden: "niet verbergen"
        await API.viewer.setObjectsVisibility(selectionData, false);

        // STAP C: Camera naar het nulpunt van de clash
        if (item.center) {
            await API.viewer.setCameraTarget(item.center.x, item.center.y, item.center.z);
            await API.viewer.setCameraDistance(2500); // Zoom in op 2.5 meter afstand
        } else {
            // Fallback als er geen center is: zoom op de selectie
            await API.viewer.zoomToSelection();
        }

    } catch (e) {
        console.error("Fout tijdens viewer interactie:", e);
    }
}

        // UI Events
        document.getElementById('btn-back').onclick = () => {
            document.getElementById('set-selection-area').classList.remove('hidden');
            document.getElementById('detail-area').classList.add('hidden');
        };

        document.getElementById('product-filter').oninput = renderFilteredItems;

        init();
    </script>
</body>
</html>
